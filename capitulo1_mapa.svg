<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1180" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .h1{font-weight:700;font-size:27px;fill:#ffffff;letter-spacing:1.5px}
      .kick{font-weight:600;font-size:13px;fill:#9db2c9;letter-spacing:1px}
      .sub{font-weight:400;font-size:14px;fill:#c7d4e2}
      .chip{font-weight:700;font-size:12px;letter-spacing:1.4px}
      .q{font-weight:500;font-size:15.5px;fill:#5a1b2b}
      .lead{font-weight:400;font-size:14.5px;fill:#2a2f37;font-style:italic}
      .body{font-weight:400;font-size:15px;fill:#2a2f37}
      .cap{font-weight:400;font-size:13px;fill:#5b6472}
      .steplbl{font-weight:700;font-size:10.5px;fill:#8a94a1;letter-spacing:.5px}
      .stepttl{font-weight:700;font-size:14px;fill:#1f2731}
      .stepd{font-weight:400;font-size:11px;fill:#4a515b}
      .coltt{font-weight:700;font-size:14px;fill:#1f2731}
      .colit{font-weight:400;font-size:12px;fill:#3a4048}
      .optt{font-weight:700;font-size:14px}
      .opbd{font-weight:400;font-size:12.5px;fill:#2f353d}
      .hgt{font-weight:700;font-size:13px}
      .hgs{font-weight:400;font-size:11.5px;fill:#4a515b}
      .white{fill:#ffffff}
      .foot{font-weight:400;font-size:12px;fill:#8a94a1}
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#aeb8c4"/>
    </marker>
    <marker id="arw" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a2b3f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="1180" fill="#eef2f6"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="960" height="96" fill="#0A4595"/>
  <rect x="0" y="96" width="960" height="4" fill="#F2A900"/>
  <text x="40" y="44" class="h1">CAPÍTULO 1 · DISPOSITIVO E PCDT</text>
  <text x="40" y="72" class="sub">Foucault posto a operar sobre o protocolo — proteger e produzir num só gesto</text>
  <text x="920" y="40" text-anchor="end" class="kick">MAPA DO CAPÍTULO</text>
  <text x="920" y="60" text-anchor="end" class="kick">SEÇÕES 1.1 – 1.5</text>

  <!-- TESE -->
  <rect x="40" y="118" width="880" height="96" rx="10" fill="#fbeef1" stroke="#e6c4cd"/>
  <rect x="40" y="126" width="6" height="80" rx="3" fill="#8a2b3f"/>
  <text x="66" y="146" class="chip" fill="#8a2b3f">TESE DO CAPÍTULO</text>
  <text x="66" y="172" class="q">O protocolo não se limita a reconhecer um grupo vulnerável para protegê-lo; ao defini-lo,</text>
  <text x="66" y="194" class="q">estende o dispositivo da sexualidade no gesto mesmo com que protege — cuidado e produção, juntos.</text>

  <!-- MÉTODO -->
  <text x="40" y="240" class="chip" fill="#0C56A6">O MÉTODO · mostrar antes de nomear</text>
  <!-- steps -->
  <g>
    <rect x="40" y="250" width="156" height="120" rx="9" fill="#ffffff" stroke="#dde3ea"/>
    <text x="56" y="274" class="steplbl">1.1</text>
    <text x="56" y="298" class="stepttl">Vigiar e punir</text>
    <text x="56" y="320" class="stepd">a peça recusada</text>
    <text x="56" y="336" class="stepd">(a prisão) vence;</text>
    <text x="56" y="352" class="stepd">o poder é produtivo</text>

    <rect x="221" y="250" width="156" height="120" rx="9" fill="#ffffff" stroke="#dde3ea"/>
    <text x="237" y="274" class="steplbl">1.1 – 1.2</text>
    <text x="237" y="298" class="stepttl">A vontade de saber</text>
    <text x="237" y="320" class="stepd">o sujeito sexual é</text>
    <text x="237" y="336" class="stepd">constituído, não</text>
    <text x="237" y="352" class="stepd">achado</text>

    <rect x="402" y="250" width="156" height="120" rx="9" fill="#eaf0f7" stroke="#b9cbe0"/>
    <text x="418" y="274" class="steplbl" fill="#0C56A6">1.3</text>
    <text x="418" y="298" class="stepttl" fill="#0C56A6">Definição</text>
    <text x="418" y="320" class="stepd">só aqui o conceito</text>
    <text x="418" y="336" class="stepd">recebe, enfim,</text>
    <text x="418" y="352" class="stepd">um nome</text>

    <rect x="583" y="250" width="156" height="120" rx="9" fill="#ffffff" stroke="#dde3ea"/>
    <text x="599" y="274" class="steplbl">1.4</text>
    <text x="599" y="298" class="stepttl">PrEP · PCDT</text>
    <text x="599" y="320" class="stepd">o conceito posto</text>
    <text x="599" y="336" class="stepd">a operar sobre</text>
    <text x="599" y="352" class="stepd">o protocolo</text>

    <rect x="764" y="250" width="156" height="120" rx="9" fill="#ffffff" stroke="#dde3ea"/>
    <text x="780" y="274" class="steplbl">1.5</text>
    <text x="780" y="298" class="stepttl">Síntese</text>
    <text x="780" y="320" class="stepd">cuidado e controle</text>
    <text x="780" y="336" class="stepd">não se opõem</text>
  </g>
  <line x1="199" y1="310" x2="218" y2="310" stroke="#aeb8c4" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="380" y1="310" x2="399" y2="310" stroke="#aeb8c4" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="561" y1="310" x2="580" y2="310" stroke="#aeb8c4" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="742" y1="310" x2="761" y2="310" stroke="#aeb8c4" stroke-width="2" marker-end="url(#ar)"/>
  <text x="40" y="390" class="cap">O operador do dispositivo já atua nos dois exercícios foucaultianos antes de ser nomeado; nomeá-lo não é aplicar</text>
  <text x="40" y="408" class="cap">uma chave externa ao PCDT, mas tornar visível aquilo que o documento já punha em obra.</text>

  <!-- CONCEITO -->
  <text x="40" y="438" class="chip" fill="#0C56A6">O CONCEITO · dispositivo (FOUCAULT, 1998)</text>
  <rect x="40" y="450" width="880" height="176" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="458" width="6" height="160" rx="3" fill="#0C56A6"/>
  <text x="58" y="478" class="lead">Nem a lei, nem a instituição, nem o saber tomados à parte: a trama que os articula.</text>

  <circle cx="66" cy="502" r="9" fill="#0C56A6"/><text x="66" y="506" text-anchor="middle" class="white" font-size="11" font-weight="700">1</text>
  <text x="84" y="507" class="coltt">Conjunto heterogêneo</text>
  <text x="58" y="530" class="colit">discursos, leis, saberes e</text>
  <text x="58" y="548" class="colit">práticas — o dito e o não</text>
  <text x="58" y="566" class="colit">dito; a rede, não a soma.</text>

  <circle cx="354" cy="502" r="9" fill="#0C56A6"/><text x="354" y="506" text-anchor="middle" class="white" font-size="11" font-weight="700">2</text>
  <text x="372" y="507" class="coltt">Sistema móvel de relações</text>
  <text x="346" y="530" class="colit">um mesmo elemento muda</text>
  <text x="346" y="548" class="colit">de função conforme a</text>
  <text x="346" y="566" class="colit">estratégia em que entra.</text>

  <circle cx="642" cy="502" r="9" fill="#0C56A6"/><text x="642" y="506" text-anchor="middle" class="white" font-size="11" font-weight="700">3</text>
  <text x="660" y="507" class="coltt">Resposta a uma urgência</text>
  <text x="634" y="530" class="colit">função estratégica dominante;</text>
  <text x="634" y="548" class="colit">sobredeterminação funcional</text>
  <text x="634" y="566" class="colit">e preenchimento estratégico.</text>
  <text x="58" y="602" class="cap">Um protocolo clínico é, à letra, esse conjunto heterogêneo — uma rede, não uma peça — e resposta estratégica a uma urgência epidemiológica.</text>

  <!-- OPERAÇÃO SOBRE O PCDT -->
  <text x="40" y="656" class="chip" fill="#374151">A OPERAÇÃO SOBRE O PCDT · a autonomia como inscrição no dispositivo (1.4)</text>

  <rect x="40" y="668" width="428" height="104" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="676" width="6" height="88" rx="3" fill="#0f766e"/>
  <text x="60" y="694" class="optt" fill="#0f766e">Dado epidemiológico</text>
  <text x="60" y="720" class="opbd">Não encontra o jovem como grupo de risco:</text>
  <text x="60" y="740" class="opbd">constitui-o como superfície de incidência.</text>

  <rect x="492" y="668" width="428" height="104" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="492" y="676" width="6" height="88" rx="3" fill="#0f766e"/>
  <text x="512" y="694" class="optt" fill="#0f766e">Dispensa da autorização parental</text>
  <text x="512" y="720" class="opbd">Desliga o permutador (família / aliança) e</text>
  <text x="512" y="740" class="opbd">religa a sexualidade à relação clínica.</text>

  <rect x="40" y="784" width="428" height="104" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="792" width="6" height="88" rx="3" fill="#0f766e"/>
  <text x="60" y="810" class="optt" fill="#0f766e">Direito e sigilo</text>
  <text x="60" y="836" class="opbd">ECA e Código de Ética não como limites, mas</text>
  <text x="60" y="856" class="opbd">como táticas (polivalência); o sigilo abre o acesso.</text>

  <rect x="492" y="784" width="428" height="104" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="492" y="792" width="6" height="88" rx="3" fill="#0f766e"/>
  <text x="512" y="810" class="optt" fill="#0f766e">Autonomia</text>
  <text x="512" y="836" class="opbd">Efeito produzido, não pressuposto: sua condição</text>
  <text x="512" y="856" class="opbd">é ingressar no monitoramento que não cessa.</text>

  <!-- HINGE aliança -> sexualidade -->
  <rect x="40" y="906" width="360" height="64" rx="10" fill="#f2f6f5" stroke="#cfe0dc"/>
  <text x="60" y="932" class="hgt" fill="#0f766e">DISPOSITIVO DA ALIANÇA</text>
  <text x="60" y="954" class="hgs">família · pátrio poder · guarda</text>

  <rect x="560" y="906" width="360" height="64" rx="10" fill="#fbeef1" stroke="#e6c4cd"/>
  <text x="580" y="932" class="hgt" fill="#8a2b3f">DISPOSITIVO DA SEXUALIDADE</text>
  <text x="580" y="954" class="hgs">relação clínica · protocolo · acompanhamento</text>

  <line x1="404" y1="938" x2="556" y2="938" stroke="#8a2b3f" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="480" y="928" text-anchor="middle" class="steplbl" fill="#8a2b3f">permutador desligado</text>

  <text x="40" y="992" class="cap">Em cada passagem, o protocolo estende o dispositivo da sexualidade no próprio movimento com que protege.</text>

  <!-- SÍNTESE -->
  <rect x="40" y="1010" width="880" height="92" rx="10" fill="#0A4595"/>
  <text x="66" y="1038" class="chip" fill="#9db2c9">SÍNTESE · 1.5</text>
  <text x="66" y="1064" class="body white">Não se pergunta se o adolescente é livre ou governado, mas por meio de quais</text>
  <text x="66" y="1086" class="body white">procedimentos ele se tornou, a um só tempo, uma coisa e outra.</text>

  <text x="40" y="1132" class="foot">Fonte: Devellis (2026), Capítulo 1 — elaboração própria.</text>
</svg>
