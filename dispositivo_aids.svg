<svg viewBox="0 0 860 822" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <title>O dispositivo da aids</title>
  <desc>Mapa conceitual do Capítulo 2 do TCC de Rodrigo Devellis (UFSC, 2026): a aids como acontecimento histórico e não entidade clínica prévia. Uma genealogia em quatro momentos — a nomeação pela mídia (Herzlich e Pierret, Barata), o pânico e a moral (Perlongher), a governamentalidade em rede (De la Dehesa) e a subjetivação preventiva ou SIDAdanização (Pelúcio e Miskolci) — que o PCDT de 2025 herda e reorganiza.</desc>

  <rect x="0" y="0" width="860" height="822" fill="#ffffff"/>

  <text x="40" y="44" font-size="12.5" letter-spacing="2" fill="#6b6b6b" font-family="Arial, Helvetica, sans-serif">CAPÍTULO 2 · DIAGNÓSTICO DO RISCO · DEVELLIS 2026</text>
  <text x="40" y="80" font-size="27" font-weight="700" fill="#1a1a1a">O dispositivo da aids</text>
  <text x="40" y="104" font-size="13" font-style="italic" fill="#6b6b6b">Uma genealogia — a prevenção nunca incide sobre populações dadas: produz aquelas sobre as quais atua.</text>

  <rect x="40" y="128" width="780" height="66" rx="10" fill="#f3eede" stroke="#dcd0b8"/>
  <text x="58" y="152" font-size="10" letter-spacing="1.5" font-weight="700" fill="#8a7a55" font-family="Arial, Helvetica, sans-serif">A TESE DO CAPÍTULO</text>
  <text x="58" y="177" font-size="14" font-weight="700" fill="#3a3428">A aids não é entidade clínica anterior aos discursos que a nomeiam, mas acontecimento histórico.</text>

  <rect x="40" y="212" width="780" height="104" rx="10" fill="#fbfaf8" stroke="#e4e1db"/>
  <rect x="40" y="220" width="6" height="88" rx="3" fill="#3f5166"/>
  <circle cx="792" cy="240" r="13" fill="#3f5166"/>
  <text x="792" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">1</text>
  <text x="70" y="240" font-size="10" letter-spacing="1.4" font-weight="700" fill="#3f5166" font-family="Arial, Helvetica, sans-serif">NOMEAÇÃO · INÍCIO DOS ANOS 1980</text>
  <text x="70" y="262" font-size="13.5" font-weight="700" fill="#2f3e4f">Herzlich &amp; Pierret · Germana Barata</text>
  <text x="70" y="284" font-size="11.5" fill="#4a4a48">A imprensa “faz existir a aids”; o Fantástico fixa o horizonte de inteligibilidade da doença no Brasil.</text>
  <text x="70" y="301" font-size="11.5" fill="#4a4a48">O “grupo de risco” desliza de associação probabilística a nexo causal — e vira “comportamento de risco”.</text>

  <path d="M423,320 L430,326 L437,320" fill="none" stroke="#b8b6ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="40" y="332" width="780" height="104" rx="10" fill="#fbfaf8" stroke="#e4e1db"/>
  <rect x="40" y="340" width="6" height="88" rx="3" fill="#b5651d"/>
  <circle cx="792" cy="360" r="13" fill="#b5651d"/>
  <text x="792" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">2</text>
  <text x="70" y="360" font-size="10" letter-spacing="1.4" font-weight="700" fill="#b5651d" font-family="Arial, Helvetica, sans-serif">PÂNICO E MORAL · ANOS 1980</text>
  <text x="70" y="382" font-size="13.5" font-weight="700" fill="#8a4d17">Néstor Perlongher</text>
  <text x="70" y="404" font-size="11.5" fill="#4a4a48">A aids “chegou nos braços da moda”: o pânico excede a incidência e a prevenção converte-se em repressão.</text>
  <text x="70" y="421" font-size="11.5" fill="#4a4a48">Descompasso entre o modelo importado e as homossexualidades populares (Serra Pelada).</text>

  <path d="M423,440 L430,446 L437,440" fill="none" stroke="#b8b6ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="40" y="452" width="780" height="100" rx="10" fill="#fbfaf8" stroke="#e4e1db"/>
  <rect x="40" y="460" width="6" height="84" rx="3" fill="#0f6e56"/>
  <circle cx="792" cy="480" r="13" fill="#0f6e56"/>
  <text x="792" y="485" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">3</text>
  <text x="70" y="480" font-size="10" letter-spacing="1.4" font-weight="700" fill="#0f6e56" font-family="Arial, Helvetica, sans-serif">GOVERNAMENTALIDADE EM REDE · ANOS 1980 &#8594; 1990</text>
  <text x="70" y="502" font-size="13.5" font-weight="700" fill="#0c5745">Rafael de la Dehesa</text>
  <text x="70" y="524" font-size="11.5" fill="#4a4a48">Do movimento sanitário, das ONGs, do SUS e do direito à saúde (anos 1980)…</text>
  <text x="70" y="541" font-size="11.5" fill="#4a4a48">…à rede gerida por Banco Mundial, editais e agentes multiplicadores (anos 1990).</text>

  <path d="M423,556 L430,562 L437,556" fill="none" stroke="#b8b6ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="40" y="568" width="780" height="100" rx="10" fill="#fbfaf8" stroke="#e4e1db"/>
  <rect x="40" y="576" width="6" height="84" rx="3" fill="#6d4a86"/>
  <circle cx="792" cy="596" r="13" fill="#6d4a86"/>
  <text x="792" y="601" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">4</text>
  <text x="70" y="596" font-size="10" letter-spacing="1.4" font-weight="700" fill="#6d4a86" font-family="Arial, Helvetica, sans-serif">SUBJETIVAÇÃO · “SIDAdanização”</text>
  <text x="70" y="618" font-size="13.5" font-weight="700" fill="#563a6b">Pelúcio &amp; Miskolci</text>
  <text x="70" y="640" font-size="11.5" fill="#4a4a48">Produz-se um sujeito responsabilizado e autovigilante; a heteronormatividade vira finalidade interiorizada.</text>
  <text x="70" y="657" font-size="11.5" fill="#4a4a48">A seletividade do dispositivo gera uma “ironia mortal”.</text>

  <line x1="430" y1="672" x2="430" y2="700" stroke="#a9a79f" stroke-width="1.5"/>
  <polygon points="430,706 425,696 435,696" fill="#a9a79f"/>

  <rect x="40" y="712" width="780" height="60" rx="12" fill="#eef1f4" stroke="#cdd6df"/>
  <text x="58" y="734" font-size="10" letter-spacing="1.5" font-weight="700" fill="#3f5166" font-family="Arial, Helvetica, sans-serif">O PCDT DE 2025 · HERANÇA E REORGANIZAÇÃO</text>
  <text x="58" y="757" font-size="12.5" fill="#33424f">A defasagem entre a população pressuposta e a encontrada retorna na distância entre o adolescente do protocolo e o dos serviços.</text>

  <rect x="40" y="782" width="780" height="26" rx="8" fill="#1a1a1a"/>
  <text x="430" y="799" text-anchor="middle" font-size="11.5" fill="#f4f2ee">A prevenção herda a operação que <tspan fill="#e6b98f">produz a população</tspan> sobre a qual incide.</text>
</svg>
