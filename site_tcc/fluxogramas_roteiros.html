<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxogramas do TCC — roteiros por capítulo</title>
<style>
  :root{
    --azul:#0A4595; --azul2:#0d59bd; --ouro:#F2A900; --verde:#0f766e;
    --marrom:#8a3b1e; --bg:#eef2f6; --card:#ffffff; --linha:#dde3ea;
    --tx:#1f2731; --tx2:#3a4048; --mut:#8a94a1;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx)}
  header{background:var(--azul);color:#fff;padding:20px 32px;border-bottom:4px solid var(--ouro)}
  header h1{margin:0;font-size:22px;letter-spacing:1px}
  header p{margin:6px 0 0;font-size:13px;color:#c7d4e2}
  .meta{position:absolute;top:20px;right:32px;text-align:right;font-size:11px;color:#9db2c9;letter-spacing:.5px;line-height:1.5}
  header{position:relative}
  nav{display:flex;flex-wrap:wrap;gap:8px;padding:16px 32px;background:#e3e9f0;border-bottom:1px solid var(--linha);position:sticky;top:0;z-index:20}
  nav button{border:1px solid var(--linha);background:#fff;color:var(--tx2);padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  nav button:hover{border-color:var(--azul)}
  nav button.active{background:var(--azul);color:#fff;border-color:var(--azul)}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 32px 80px}
  .tese{background:#fff;border:1px solid var(--linha);border-left:6px solid var(--ouro);border-radius:10px;padding:16px 20px;margin-bottom:8px}
  .tese .lbl{font-size:11px;font-weight:700;letter-spacing:1.4px;color:#8a5a12}
  .tese p{margin:6px 0 0;font-size:14.5px;line-height:1.5;color:var(--tx2)}
  .funcao{font-size:12.5px;color:var(--mut);margin:10px 2px 20px;font-style:italic}
  .flow{display:flex;flex-direction:column;align-items:stretch;gap:0}
  .node{position:relative;background:#fff;border:1px solid var(--linha);border-left:6px solid var(--accent,var(--azul));border-radius:10px;padding:14px 54px 14px 18px;cursor:pointer;transition:.15s;box-shadow:0 1px 2px rgba(20,40,80,.04)}
  .node:hover{border-color:var(--azul);box-shadow:0 4px 14px rgba(20,40,80,.12);transform:translateY(-1px)}
  .node .num{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent,var(--azul))}
  .node .tit{font-size:15.5px;font-weight:700;margin-top:3px}
  .node .hint{font-size:12px;color:var(--mut);margin-top:5px}
  .node .go{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:#eef3fb;color:var(--azul);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
  .arrow{width:2px;height:22px;background:#c2cbd6;margin:0 auto;position:relative}
  .arrow::after{content:"";position:absolute;left:-4px;bottom:-1px;border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid #c2cbd6}
  /* painel */
  .overlay{position:fixed;inset:0;background:rgba(15,25,45,.45);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .overlay.on{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;height:100%;width:min(520px,92vw);background:#fff;box-shadow:-8px 0 30px rgba(10,30,60,.25);transform:translateX(100%);transition:.25s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
  .panel.on{transform:translateX(0)}
  .panel .ph{background:var(--azul);color:#fff;padding:20px 24px}
  .panel .ph .pnum{font-size:11px;letter-spacing:1.4px;color:#c7d4e2;font-weight:700}
  .panel .ph h2{margin:6px 0 0;font-size:19px;line-height:1.3}
  .panel .ph .cap{margin-top:8px;font-size:12px;color:#9db2c9}
  .panel .pb{padding:22px 24px;overflow:auto;flex:1}
  .panel .pb h3{font-size:12px;letter-spacing:1.2px;color:var(--azul);margin:0 0 10px;text-transform:uppercase}
  .panel .pb h3:not(:first-child){margin-top:26px}
  .roteiro li{font-size:14px;line-height:1.55;color:var(--tx2);margin-bottom:10px}
  .roteiro{padding-left:20px;margin:0}
  .cite{background:#f6f8fb;border:1px solid var(--linha);border-left:4px solid var(--ouro);border-radius:8px;padding:12px 14px;margin-bottom:12px}
  .cite p{margin:0;font-size:13.5px;line-height:1.5;color:var(--tx);font-style:italic}
  .cite .src{margin-top:8px;font-size:11.5px;color:var(--mut);font-style:normal}
  .concept{display:inline-block;background:#eef3fb;color:var(--azul);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;margin:0 6px 6px 0}
  .close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer}
  .panel .ph{position:relative}
  .empty{font-size:13px;color:var(--mut)}
  footer{text-align:center;font-size:12px;color:var(--mut);padding:24px}
</style>
</head>

<script id="data" type="application/json">{"metadados": {"titulo": "Diagnóstico do risco: o paciente parcial e a expansão do acesso à PrEP no Brasil", "autor": "Rodrigo Antonio Devellis", "orientadora": "Márcia da Silva Mazon", "instituicao": "Universidade Federal de Santa Catarina", "curso": "Ciências Sociais", "grau": "licenciatura", "ano": 2026, "palavras_chave": ["PrEP", "adolescência", "HIV/aids", "PCDT", "medicalização do risco", "dispositivo", "biopolítica", "governamentalidade", "paciente parcial", "cidadania biológica"]}, "introducao": {"ideias_centrais": ["O PCDT de 2025 estende a PrEP a pessoas a partir de 15 anos e dispensa a autorização parental, sob sigilo; o adolescente é incorporado como sujeito elegível.", "O protocolo não apenas identifica um grupo já existente para protegê-lo: ao defini-lo, produz em parte a figura do adolescente sexualmente ativo, autônomo, compreendente e acompanhado.", "A investigação recusa causas, efeitos e méritos da medida e trata a inclusão do adolescente como objeto a descrever, e não a celebrar ou denunciar."], "pergunta_de_pesquisa": "De que modo o protocolo torna o adolescente inteligível e governável — sexualmente ativo, autônomo, apto a compreender e a aderir ao acompanhamento — ao defini-lo como elegível?", "objetivo_geral": "Analisar, a partir de revisão teórica e bibliográfica, as condições sociais, históricas e teóricas que tornam possível a expansão do acesso à PrEP entre adolescentes de 15 a 19 anos no Brasil, articulando dispositivo, biopolítica, governamentalidade, medicalização e cidadania biológica ao caso codificado no PCDT (BRASIL, 2025).", "objetivos_especificos": ["Examinar a PrEP como tecnologia inscrita no dispositivo da aids, identificando os deslocamentos internos que sua incorporação produz na configuração brasileira da prevenção (Foucault, Conrad, Rose).", "Examinar o adolescente como categoria historicamente construída e como segmento-alvo da expansão, reconstituindo sua sociogênese e sua operacionalização no PCDT (critérios de elegibilidade, dispensa de autorização parental, marcadores etários, comportamentais e epidemiológicos)."], "justificativa": "A inclusão do adolescente como sujeito elegível marca uma inflexão na política brasileira de prevenção ao HIV; o pouco examinado é o modo como essa entrada na política pública se organiza — por quais critérios, arranjos jurídicos e qual figura do adolescente.", "metodologia": "Pesquisa qualitativa, teórico-bibliográfica e documental. Corpus: o PCDT (BRASIL, 2025) como fonte central e o referencial teórico como categorias de leitura. Análise de inspiração genealógica, com o documento lido como elemento ativo (Prior). Limite assumido: a leitura se detém no plano da página, não nos usos do documento.", "quadro_teorico_minimo": [{"nome": "Dispositivo", "autor": "Foucault", "definicao": "Rede heterogênea de discursos, leis, normas e práticas que responde a uma urgência histórica e produz os sujeitos sobre os quais incide.", "fonte": "FOUCAULT, 1998"}, {"nome": "Biopolítica e governamentalidade", "autor": "Foucault", "definicao": "A biopolítica toma a vida das populações como superfície de intervenção; a governamentalidade é a racionalidade e as tecnologias que conduzem condutas.", "fonte": "FOUCAULT, 2008"}, {"nome": "Dispositivo da aliança x dispositivo da sexualidade", "autor": "Foucault", "definicao": "A família como permutador entre um regime centrado no parentesco/lei e outro centrado na clínica/exame.", "fonte": "FOUCAULT, 1999"}, {"nome": "Medicalização e paciente parcial", "autor": "Conrad", "definicao": "Definir um problema em termos médicos é conferir jurisdição; a medicalização do risco trata como condição atual o que é probabilidade futura, e o paciente parcial medica um corpo sem doença.", "fonte": "CONRAD, 2006, 2007"}, {"nome": "Política vital e cidadania biológica", "autor": "Rose", "definicao": "Modulação das capacidades vitais no plano molecular e reorganização de solidariedades e demandas em torno de estatutos biológicos, que também abrem a possibilidade de reivindicar a vida como direito.", "fonte": "ROSE, 2007"}, {"nome": "Documento como elemento ativo", "autor": "Prior", "definicao": "O documento tem autoria distribuída (author-function) e participa da constituição daquilo que parece apenas registrar.", "fonte": "PRIOR, 2003"}]}, "capitulos": [{"numero": "1", "titulo": "Dispositivo e PCDT", "tese_do_capitulo": "O PCDT não se limita a reconhecer um grupo vulnerável para protegê-lo; ao defini-lo, estende o dispositivo da sexualidade no gesto mesmo com que protege, produzindo o adolescente como sujeito autônomo, compreendente e acompanhado.", "ideias_centrais": ["Vigiar e punir e A vontade de saber comparecem como forma/procedimento de leitura do dispositivo, não como conteúdo carcerário transposto ao protocolo.", "O dado epidemiológico não encontra o jovem como grupo de risco já dado: constitui-o como superfície de incidência.", "A dispensa da autorização parental desliga o permutador (família/aliança) e religa a sexualidade do adolescente ao dispositivo da sexualidade — à relação clínica.", "Direito (ECA, Código de Ética Médica) e sigilo não são limites a vencer, mas táticas mobilizadas: polivalência tática dos discursos.", "A autonomia é efeito produzido, não pressuposto, e vem amarrada à exigência de compreender a profilaxia e o acompanhamento — isto é, ao ingresso no monitoramento contínuo."], "funcao_no_argumento": "Instala a analítica do dispositivo e a aplica ao PCDT, fixando a tese matriz (proteger e produzir num só gesto) que os capítulos seguintes desdobram.", "articulacao_com_objeto": "Lê os critérios de elegibilidade e a dispensa de autorização parental do PCDT como deslocamento de um regime de poder (aliança) a outro (sexualidade).", "conceitos_chave": [{"nome": "Dispositivo", "autor": "Foucault", "fonte": "FOUCAULT, 1998, p. 244-246"}, {"nome": "Polivalência tática dos discursos", "autor": "Foucault", "fonte": "FOUCAULT, 1999, p. 96-97"}, {"nome": "Permutador aliança/sexualidade", "autor": "Foucault", "fonte": "FOUCAULT, 1999, p. 100-106"}], "autores_mobilizados": [{"nome": "Michel Foucault", "obras": ["Vigiar e punir", "História da sexualidade I", "Microfísica do poder"], "papel": "Fornece a analítica do dispositivo e a distinção aliança/sexualidade."}], "citacoes_chave": [{"texto": "Os novos casos de aids se concentram, majoritariamente, na população jovem (15 a 24 anos).", "fonte": "BRASIL, 2025", "pagina": "11", "contexto": "Dado epidemiológico que abre a justificativa do protocolo e constitui o jovem como superfície de incidência."}, {"texto": "Não sendo necessário o consentimento dos pais e/ou responsáveis.", "fonte": "BRASIL, 2025", "pagina": "21", "contexto": "Dispensa da autorização parental lida como desligamento do permutador."}], "secoes": [{"numero": "1.1", "titulo": "Sobre a vigilância: suavizada e sofisticada", "ideias_centrais": ["A peça recusada pelo programa penal (a prisão) é a que vence: o dispositivo retém efeitos não previstos.", "O poder é produtivo: constitui a criança como sujeito sexual, não apenas interdita."]}, {"numero": "1.2", "titulo": "Sexualidade livre mas produzida", "ideias_centrais": ["Afirmar o sexo pode ser mover-se conforme o traçado do dispositivo; a liberdade vivida não está fora do que a tornou possível."]}, {"numero": "1.3", "titulo": "Definição", "ideias_centrais": ["O dispositivo é rede heterogênea, sistema móvel de relações e resposta estratégica a uma urgência; sobredeterminação funcional e preenchimento estratégico."]}, {"numero": "1.4", "titulo": "A PrEP para adolescentes: a autonomia como inscrição no dispositivo", "ideias_centrais": ["A criança masturbadora retorna na cláusula do sujeito 'sexualmente ativo' em 'vulnerabilidade acrescida'.", "O sigilo abre o acesso em vez de suprimir; a autonomia é produzida na exigência de compreensão."]}, {"numero": "1.5", "titulo": "Síntese", "ideias_centrais": ["Cuidado e controle não se opõem: a analítica não opta e ção sexualmente exposta, torna as exposições comparáveis e elegíveis, produz verdade metodicamente e retorna ao indivíduo na figura do sujeito aderente.", "ideias_centrais": ["Author-function distribuída: mandato estatal (Decreto 7.508/2011) repartido entre Dathi, SVSA, Comitê Técnico e Conitec.", "'Vulnerabilidade acrescida' desloca o risco da identidade para práticas e determinantes sociais, sem abandonar a produção de categorias governáveis.", "Segurança, território, população: o protocolo compõe lei (vetos binários), disciplina (posologia, retorno) e segurança (modulação por séries e probabilidades); a PrEP sob demanda (2+1+1) explicita esse cruzamento.", "Nascimento da biopolítica: PICO/PICOS, descritores controlados, GRADE, consenso e consulta pública operam como veridicção — o 'risco' e a 'elegibilidade' constituem-se no percurso do aparato.", "O uso off-label e a extrapolação por analogia mostram que a autoridade vem tanto do que o aparato demonstra quanto do modo regulado com que trata o que não pode demonstrar.", "Sujeito aderente: o social não é apagado, é retraduzido tecnicamente em variável de risco, adesão e autovigilância."], "funcao_no_argumento": "Núcleo empírico: examina o PCDT em detalhe como dispositivo documental e sustenta a tese de que ele governa por uma verdade produzida metodicamente.", "articulacao_com_objeto": "É a leitura analítica e detida do próprio texto do protocolo (elegibilidade, evidência, acompanhamento).", "conceitos_chave": [{"nome": "Author-function", "autor": "Prior", "fonte": "PRIOR, 2003, p. 11-12"}, {"nome": "Veridicção", "autor": "Foucault", "fonte": "FOUCAULT, 2008b"}, {"nome": "Normalização securitária x normação disciplinar", "autor": "Foucault", "fonte": "FOUCAULT, 2008a"}], "citacoes_chave": [{"texto": "O simples pertencimento a um dos segmentos populacionais-chave [...] não é suficiente para caracterizar indivíduos em situação de maior vulnerabilidade ao HIV.", "fonte": "BRASIL, 2025", "pagina": "18", "contexto": "Recusa do automatismo identidade = risco."}, {"texto": "Os estudos de PrEP sob demanda não apresentam evidências de proteção para relações sexuais neovaginais receptivas.", "fonte": "BRASIL, 2025", "pagina": "40", "contexto": "Limite da extrapolação por analogia; herança do cânone de ensaios centrado no masculino."}], "secoes": [{"numero": "4.1", "titulo": "Sexualidade, vida e população", "ideias_centrais": ["A vulnerabilidade acrescida como operador que traduz um campo social e biográfico em campo clinicamente legível."]}, {"numero": "4.2", "titulo": "Segurança, circulação e elegibilidade", "ideias_centrais": ["A elegibilidade não é porta que abre/fecha, mas ponto em que práticas, corpos, exames e probabilidades viram decisão de governo."]}, {"numero": "4.3", "titulo": "Verdade, evidência e decisão", "ideias_centrais": ["A recomendação baseada em evidência é produto de uma cadeia de operações (seleção, vocabulário, fontes, condensação, hierarquia, arbitragem)."]}, {"numero": "4.4", "titulo": "Sujeito aderente e limites do dispositivo", "ideias_centrais": ["O cálculo populacional retorna à escala individual como adesão, acompanhamento e responsabilização; o limite não é não ver o social, mas traduzi-lo em variável governável."]}]}, {"numero": "5", "titulo": "O medicamento", "tese_do_capitulo": "Medicar corpos sem doença não começou com a PrEP: do AZT ao tratamento precoce, a racionalidade antirretroviral já se adiantava à doença manifesta, constituindo o paciente parcial (Conrad) e inscrevendo a vida numa política e numa economia do vital (Rose).", "ideias_centrais": ["Epstein: molecularização (o AZT reutilizado); a temporalidade da ciência choca-se com a da morte; o ativismo terapêutico aprende a ler e disputar os ensaios.", "O ACTG 019 (1990) sustenta o tratamento precoce: ao começar a terapia, uma pessoa saudável converte-se em paciente, provavelmente por toda a vida.", "Marcadores substitutivos (CD4, carga viral) instauram uma racionalidade de acompanhamento — seguir, medir e reajustar um corpo que ainda não adoeceu.", "Conrad: definir é conferir jurisdição; medicalização do risco, protodisease, paciente parcial e individualização dos problemas sociais.", "No adolescente, a autonomia é a de entrar por iniciativa própria no dispositivo; exige-se dele a competência para gerir a própria probabilidade.", "Rose: política vital, molecularização, prudência genética e cidadania biológica — tensão constitutiva entre obrigação e agência."], "funcao_no_argumento": "Fecha a genealogia mostrando que a lógica de antecipação da PrEP é herdada do próprio fármaco, e articula medicalização (Conrad) e subjetivação/cidadania biológica (Rose).", "articulacao_com_objeto": "Relê os critérios do PCDT para o adolescente à luz da medicalização do risco e do paciente parcial.", "autores_mobilizados": [{"nome": "Steven Epstein", "obras": ["Impure science"], "papel": "Constituição contestada da evidência e do tratamento precoce (AZT)."}, {"nome": "Peter Conrad", "papel": "Medicalização, medicalização do risco, paciente parcial, individualização."}, {"nome": "Nikolas Rose", "obras": ["The politics of life itself"], "papel": "Política vital, molecularização e cidadania biológica."}], "secoes": [{"numero": "5.1", "titulo": "AZT", "ideias_centrais": ["Da molecularização da aids à politização do acesso ao molecular; medicar o infectado assintomático em nome de um porvir a impedir."]}, {"numero": "5.2", "titulo": "Medicalização", "ideias_centrais": ["O risco recoberto por uma racionalidade clínica que o aborda como se já houvesse doença; o paciente parcial e o horizonte do 'último indivíduo saudável'."]}, {"numero": "5.3", "titulo": "Biocidadania", "ideias_centrais": ["Quem o indivíduo se torna ao ser inscrito no regime molecular: sujeito convocado a calcular o próprio risco, entre responsabilização e liberdade."]}]}], "conclusao": {"ideias_centrais": ["A resposta à pergunta não tem a forma de uma causa, mas de um terreno: dispositivo da aids, racionalidade antirretroviral, adolescência historicamente produzida e a forma documental do protocolo.", "O PCDT não encontra o adolescente que protege: ele o constitui — sexualmente ativo, autônomo, compreendente e acompanhado — no gesto mesmo da proteção.", "A operação recorrente é proteger e produzir num único gesto; a alternativa entre cuidado e controle se dissolve.", "A vida é inscrita numa economia (Rose): o estatuto de soronegativo torna-se valor a manter, e a população elegível sustenta um circuito de saúde pública, indústria e administração do risco.", "A cidadania biológica lembra que o acesso ao fármaco também pode ser reivindicado como direito, contestado e organizado coletivamente."], "sintese_do_argumento": "Antes de operar como técnica preventiva, a PrEP pressupõe um sujeito de risco que precisou ser constituído; o trabalho descreve as condições e os efeitos dessa constituição.", "limites": "A análise se detém no plano da página — o protocolo como dispositivo escrito —, valendo para os efeitos de subjetivação inscritos no documento, não para os seus usos nos serviços.", "agenda_futura": ["As juventudes no plural: investigar quem efetivamente acessa a profilaxia, sob quais condições e trajetórias, e como a desigualdade convertida em variável retorna na implementação.", "A rede de evidências: acompanhar como o cânone de ensaios centrado no masculino se reproduz ou se corrige nas próximas revisões do documento."]}}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const m = DATA.metadados;
document.getElementById('subtitle').textContent = m.titulo;
document.getElementById('meta').innerHTML = m.autor.toUpperCase()+'<br>'+m.instituicao+' · '+m.curso.toUpperCase()+' · '+m.ano+'<br>Orient.: '+m.orientadora;

const COLORS = {intro:'var(--verde)', cap:'var(--azul)', concl:'var(--marrom)'};

// build sections list per view
function introSections(){
  const s=[];
  s.push({num:'0.1', tit:'Ideias centrais & pergunta', kind:'intro', payload:{
    ideias: DATA.introducao.ideias_centrais,
    extra:[['Pergunta de pesquisa', DATA.introducao.pergunta_de_pesquisa]]
  }});
  s.push({num:'0.2', tit:'Objetivos', kind:'intro', payload:{
    ideias:[DATA.introducao.objetivo_geral, ...DATA.introducao.objetivos_especificos]
  }});
  s.push({num:'0.3', tit:'Justificativa & metodologia', kind:'intro', payload:{
    ideias:[DATA.introducao.justificativa, DATA.introducao.metodologia]
  }});
  s.push({num:'0.4', tit:'Quadro teórico mínimo', kind:'intro', payload:{
    conceitos: DATA.introducao.quadro_teorico_minimo.map(c=>({nome:c.nome+' ('+c.autor+')', def:c.definicao, fonte:c.fonte}))
  }});
  return s;
}
function conclSections(){
  return [
   {num:'C.1', tit:'Ideias centrais', kind:'concl', payload:{ideias:DATA.conclusao.ideias_centrais}},
   {num:'C.2', tit:'Síntese & limites', kind:'concl', payload:{ideias:[DATA.conclusao.sintese_do_argumento, DATA.conclusao.limites]}},
   {num:'C.3', tit:'Agenda futura', kind:'concl', payload:{ideias:DATA.conclusao.agenda_futura}}
  ];
}

const VIEWS = [];
VIEWS.push({id:'intro', label:'Introdução', kind:'intro', titulo:'Introdução',
  tese:DATA.introducao.pergunta_de_pesquisa, teseLbl:'PERGUNTA DE PESQUISA', funcao:'',
  sections:introSections()});
DATA.capitulos.forEach(c=>{
  VIEWS.push({id:'cap'+c.numero, label:'Cap. '+c.numero, kind:'cap', titulo:'Capítulo '+c.numero+' — '+c.titulo,
    tese:c.tese_do_capitulo, teseLbl:'TESE DO CAPÍTULO', funcao:c.funcao_no_argumento,
    conceitos:c.conceitos_chave||[], citacoes:c.citacoes_chave||[], autores:c.autores_mobilizados||[],
    sections:c.secoes.map(s=>({num:s.numero, tit:s.titulo, kind:'cap', payload:{ideias:s.ideias_centrais}}))});
});
VIEWS.push({id:'concl', label:'Conclusão', kind:'concl', titulo:'Conclusão',
  tese:DATA.conclusao.sintese_do_argumento, teseLbl:'SÍNTESE DO ARGUMENTO', funcao:'',
  sections:conclSections()});

// nav
const nav=document.getElementById('nav');
VIEWS.forEach((v,i)=>{
  const b=document.createElement('button');
  b.textContent=v.label; b.onclick=()=>render(i);
  v._btn=b; nav.appendChild(b);
});

const stage=document.getElementById('stage');
function render(idx){
  VIEWS.forEach(v=>v._btn.classList.remove('active'));
  VIEWS[idx]._btn.classList.add('active');
  const v=VIEWS[idx];
  const color=COLORS[v.kind];
  let h='<div class="tese" style="border-left-color:'+color+'"><div class="lbl">'+v.teseLbl+'</div><p>'+esc(v.tese)+'</p></div>';
  if(v.funcao) h+='<div class="funcao">Função no argumento: '+esc(v.funcao)+'</div>';
  else h+='<div style="height:14px"></div>';
  h+='<div class="flow">';
  v.sections.forEach((s,j)=>{
    const hint = s.payload.ideias ? esc(s.payload.ideias[0]).slice(0,90)+(s.payload.ideias[0].length>90?'…':'')
                 : (s.payload.conceitos? s.payload.conceitos.length+' conceitos-chave' : '');
    h+='<div class="node" style="--accent:'+color+'" onclick="openPanel('+idx+','+j+')">'
      +'<div class="num">'+esc(s.num)+'</div><div class="tit">'+esc(s.tit)+'</div>'
      +'<div class="hint">'+hint+'</div><div class="go">›</div></div>';
    if(j<v.sections.length-1) h+='<div class="arrow"></div>';
  });
  h+='</div>';
  stage.innerHTML=h;
  window.scrollTo(0,0);
}

function openPanel(vi,si){
  const v=VIEWS[vi], s=v.sections[si], p=s.payload;
  document.getElementById('pnum').textContent=s.num;
  document.getElementById('ptitle').textContent=s.tit;
  document.getElementById('pcap').textContent=v.titulo;
  let b='';
  if(p.ideias){ b+='<h3>Roteiro · pontos de fala</h3><ul class="roteiro">'+p.ideias.map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul>'; }
  if(p.extra){ p.extra.forEach(([lbl,val])=>{ b+='<h3>'+esc(lbl)+'</h3><ul class="roteiro"><li>'+esc(val)+'</li></ul>'; }); }
  if(p.conceitos){ b+='<h3>Conceitos</h3>'; p.conceitos.forEach(c=>{ b+='<div class="cite"><p>'+esc(c.nome)+'</p><p style="font-style:normal;margin-top:6px;font-size:13px">'+esc(c.def)+'</p><div class="src">'+esc(c.fonte)+'</div></div>'; }); }
  // chapter context
  if(v.kind==='cap'){
    if(v.conceitos && v.conceitos.length){ b+='<h3>Conceitos-chave do capítulo</h3><div>'+v.conceitos.map(c=>'<span class="concept" title="'+esc(c.fonte)+'">'+esc(c.nome)+'</span>').join('')+'</div>'; }
    if(v.citacoes && v.citacoes.length){ b+='<h3>Citações do PCDT</h3>'+v.citacoes.map(c=>'<div class="cite"><p>“'+esc(c.texto)+'”</p><div class="src">'+esc(c.fonte)+', p. '+esc(c.pagina)+' — '+esc(c.contexto)+'</div></div>').join(''); }
  }
  document.getElementById('pbody').innerHTML=b||'<p class="empty">Sem detalhamento.</p>';
  document.getElementById('panel').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}
function closePanel(){ document.getElementById('panel').classList.remove('on'); document.getElementById('overlay').classList.remove('on'); }
document.getElementById('close').onclick=closePanel;
document.getElementById('overlay').onclick=closePanel;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
render(0);
</script>
</body>
</html>
