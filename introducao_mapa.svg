<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .h1{font-weight:700;font-size:30px;fill:#ffffff;letter-spacing:2px}
      .kick{font-weight:600;font-size:13px;fill:#9db2c9;letter-spacing:1px}
      .sub{font-weight:400;font-size:14px;fill:#c7d4e2}
      .chip{font-weight:700;font-size:12px;letter-spacing:1.6px}
      .lead{font-weight:600;font-size:16px;fill:#1f2731}
      .body{font-weight:400;font-size:15px;fill:#2a2f37}
      .bodysm{font-weight:400;font-size:13.5px;fill:#2f353d}
      .q{font-weight:500;font-size:16.5px;fill:#5a1b2b}
      .pill{font-weight:700;font-size:14.5px;fill:#1f2731}
      .item{font-weight:400;font-size:12.5px;fill:#3a4048}
      .muted{fill:#6b7480}
      .foot{font-weight:400;font-size:12px;fill:#8a94a1}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#aeb8c4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="1200" fill="#eef2f6"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="960" height="96" fill="#0A4595"/>
  <rect x="0" y="96" width="960" height="4" fill="#F2A900"/>
  <text x="40" y="46" class="h1">INTRODUÇÃO</text>
  <text x="40" y="74" class="sub">Diagnóstico do risco: o paciente parcial e a expansão do acesso à PrEP no Brasil</text>
  <text x="920" y="40" text-anchor="end" class="kick">MAPA DA INTRODUÇÃO</text>
  <text x="920" y="60" text-anchor="end" class="kick">TCC · CIÊNCIAS SOCIAIS · UFSC · 2026</text>

  <!-- 1. O OBJETO -->
  <rect x="40" y="120" width="880" height="138" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="128" width="6" height="122" rx="3" fill="#0f766e"/>
  <text x="66" y="150" class="chip" fill="#0f766e">O OBJETO</text>
  <text x="66" y="178" class="lead">A inflexão do PCDT 2025</text>
  <circle cx="72" cy="201" r="3" fill="#0f766e"/><text x="86" y="206" class="body">PrEP estendida a todas as pessoas a partir de 15 anos (peso ≥ 35 kg).</text>
  <circle cx="72" cy="223" r="3" fill="#0f766e"/><text x="86" y="228" class="body">Início sem anuência de pais ou responsáveis, sob reserva de sigilo.</text>
  <circle cx="72" cy="245" r="3" fill="#0f766e"/><text x="86" y="250" class="body">O acesso passa a depender da relação entre o adolescente e o serviço de saúde.</text>

  <line x1="480" y1="258" x2="480" y2="273" stroke="#aeb8c4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. O PROBLEMA -->
  <rect x="40" y="274" width="880" height="94" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="282" width="6" height="78" rx="3" fill="#374151"/>
  <text x="66" y="304" class="chip" fill="#374151">O PROBLEMA</text>
  <text x="66" y="330" class="body">Ao defini-lo como elegível, o protocolo não apenas reconhece o adolescente:</text>
  <text x="66" y="352" class="body">em parte o <tspan font-weight="600">produz</tspan> — sexualmente ativo, autônomo, apto a compreender e a aderir.</text>

  <line x1="480" y1="368" x2="480" y2="383" stroke="#aeb8c4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. PERGUNTA DE PESQUISA -->
  <rect x="40" y="384" width="880" height="130" rx="10" fill="#fbeef1" stroke="#e6c4cd"/>
  <rect x="40" y="392" width="6" height="114" rx="3" fill="#8a2b3f"/>
  <text x="66" y="414" class="chip" fill="#8a2b3f">PERGUNTA DE PESQUISA</text>
  <text x="66" y="444" class="q">De que modo o protocolo torna o adolescente inteligível e governável —</text>
  <text x="66" y="470" class="q">sexualmente ativo, autônomo, apto a compreender e a aderir ao acompanhamento —</text>
  <text x="66" y="496" class="q">ao defini-lo como elegível?</text>

  <line x1="480" y1="514" x2="480" y2="529" stroke="#aeb8c4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. OBJETIVO GERAL -->
  <rect x="40" y="530" width="880" height="130" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="538" width="6" height="114" rx="3" fill="#0C56A6"/>
  <text x="66" y="560" class="chip" fill="#0C56A6">OBJETIVO GERAL</text>
  <text x="66" y="588" class="body">Analisar as condições sociais, históricas e teóricas que tornam possível a</text>
  <text x="66" y="610" class="body">expansão do acesso à PrEP entre adolescentes de 15 a 19 anos no Brasil,</text>
  <text x="66" y="632" class="body">articulando dispositivo, biopolítica, governamentalidade, medicalização e</text>
  <text x="66" y="654" class="body">cidadania biológica ao caso codificado no PCDT (BRASIL, 2025).</text>

  <line x1="480" y1="660" x2="480" y2="675" stroke="#aeb8c4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. OBJETIVOS ESPECÍFICOS -->
  <text x="480" y="694" text-anchor="middle" class="chip" fill="#2867AE">OBJETIVOS ESPECÍFICOS</text>
  <rect x="40" y="704" width="428" height="150" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <text x="60" y="732" class="pill">1 · A PrEP no dispositivo da aids</text>
  <text x="60" y="758" class="bodysm">Situar a PrEP no dispositivo da aids e</text>
  <text x="60" y="778" class="bodysm">identificar os deslocamentos que sua</text>
  <text x="60" y="798" class="bodysm">incorporação produz na prevenção brasileira.</text>
  <text x="60" y="826" class="bodysm muted" font-style="italic">Foucault · Conrad · Rose</text>

  <rect x="492" y="704" width="428" height="150" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <text x="512" y="732" class="pill">2 · O adolescente como categoria</text>
  <text x="512" y="758" class="bodysm">Reconstituir a sociogênese da adolescência</text>
  <text x="512" y="778" class="bodysm">e sua operacionalização no PCDT:</text>
  <text x="512" y="798" class="bodysm">elegibilidade, dispensa parental e</text>
  <text x="512" y="818" class="bodysm">marcadores etários e de risco.</text>

  <line x1="480" y1="854" x2="480" y2="869" stroke="#aeb8c4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. METODOLOGIA -->
  <rect x="40" y="870" width="880" height="92" rx="10" fill="#ffffff" stroke="#dde3ea"/>
  <rect x="40" y="878" width="6" height="76" rx="3" fill="#2f6f6a"/>
  <text x="66" y="900" class="chip" fill="#2f6f6a">METODOLOGIA</text>
  <text x="66" y="926" class="body">Qualitativa · teórico-bibliográfica e documental &#160;&#160;·&#160;&#160; fonte central: PCDT (2025).</text>
  <text x="66" y="948" class="body">Documento como elemento ativo (Prior) · leitura genealógica · limite: o plano da página.</text>

  <!-- 7. QUADRO TEÓRICO MÍNIMO -->
  <text x="480" y="992" text-anchor="middle" class="chip" fill="#a9761f">QUADRO TEÓRICO MÍNIMO · instrumentos de leitura</text>

  <rect x="40" y="1004" width="208" height="150" rx="8" fill="#fdf6ea" stroke="#ecd9b6"/>
  <text x="60" y="1032" class="pill">Foucault</text>
  <line x1="60" y1="1042" x2="228" y2="1042" stroke="#ecd9b6"/>
  <text x="60" y="1066" class="item">dispositivo</text>
  <text x="60" y="1086" class="item">biopolítica</text>
  <text x="60" y="1106" class="item">governamentalidade</text>
  <text x="60" y="1126" class="item">aliança / sexualidade</text>

  <rect x="264" y="1004" width="208" height="150" rx="8" fill="#fdf6ea" stroke="#ecd9b6"/>
  <text x="284" y="1032" class="pill">Conrad</text>
  <line x1="284" y1="1042" x2="452" y2="1042" stroke="#ecd9b6"/>
  <text x="284" y="1066" class="item">medicalização do risco</text>
  <text x="284" y="1086" class="item">paciente parcial</text>
  <text x="284" y="1106" class="item">individualização</text>

  <rect x="488" y="1004" width="208" height="150" rx="8" fill="#fdf6ea" stroke="#ecd9b6"/>
  <text x="508" y="1032" class="pill">Rose</text>
  <line x1="508" y1="1042" x2="676" y2="1042" stroke="#ecd9b6"/>
  <text x="508" y="1066" class="item">política vital</text>
  <text x="508" y="1086" class="item">cidadania biológica</text>
  <text x="508" y="1106" class="item">molecularização</text>

  <rect x="712" y="1004" width="208" height="150" rx="8" fill="#fdf6ea" stroke="#ecd9b6"/>
  <text x="732" y="1032" class="pill">Prior</text>
  <line x1="732" y1="1042" x2="900" y2="1042" stroke="#ecd9b6"/>
  <text x="732" y="1066" class="item">documento como</text>
  <text x="732" y="1086" class="item">elemento ativo</text>
  <text x="732" y="1106" class="item">(método)</text>

  <text x="40" y="1182" class="foot">Fonte: Devellis (2026), Introdução — elaboração própria.</text>
</svg>
