<svg viewBox="0 0 820 566" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <title>Biopolítica e governamentalidade</title>
  <desc>Diagrama do referencial foucaultiano do TCC de Rodrigo Devellis (UFSC, 2026): o biopoder como poder voltado para a vida, em dois polos (anatomopolítica do corpo e biopolítica da população); a distinção entre biopolítica (o objeto: a população como superfície de intervenção) e governamentalidade (a forma: a racionalidade que conduz condutas), com a aplicação ao caso da PrEP para adolescentes.</desc>

  <rect x="0" y="0" width="820" height="566" fill="#ffffff"/>

  <!-- header -->
  <text x="40" y="44" font-size="12.5" letter-spacing="2" fill="#6b6b6b" font-family="Arial, Helvetica, sans-serif">TCC · REFERENCIAL FOUCAULTIANO · DEVELLIS 2026</text>
  <text x="40" y="80" font-size="27" font-weight="700" fill="#1a1a1a">Biopolítica e governamentalidade</text>
  <text x="40" y="104" font-size="13" font-style="italic" fill="#6b6b6b">Duas noções que convém não fundir.</text>

  <!-- context strip: biopoder -->
  <rect x="40" y="120" width="740" height="70" rx="10" fill="#f0efec" stroke="#e4e1db"/>
  <text x="56" y="141" font-size="10.5" letter-spacing="1.5" font-weight="700" fill="#555550" font-family="Arial, Helvetica, sans-serif">BIOPODER · UM PODER VOLTADO PARA A VIDA</text>
  <text x="764" y="141" font-size="9.5" letter-spacing="1" text-anchor="end" fill="#8a8880" font-family="Arial, Helvetica, sans-serif">FOUCAULT · A VONTADE DE SABER, cap. V</text>
  <text x="56" y="162" font-size="11.5" font-style="italic" fill="#44443f">“As disciplinas do corpo e as regulações da população constituem os dois pólos</text>
  <text x="56" y="178" font-size="11.5" font-style="italic" fill="#44443f">em torno dos quais se desenvolveu a organização do poder sobre a vida.”</text>

  <!-- =============== COLUMN 1 · BIOPOLÍTICA =============== -->
  <rect x="40" y="200" width="350" height="58" rx="10" fill="#0f6e56"/>
  <text x="215" y="227" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">BIOPOLÍTICA</text>
  <text x="215" y="245" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#bfe0d5" font-family="Arial, Helvetica, sans-serif">O OBJETO · A POPULAÇÃO</text>
  <path d="M40,248 h350 v208 q0,10 -10,10 h-330 q-10,0 -10,-10 z" fill="#fbfaf8" stroke="#e4e1db"/>

  <text x="56" y="282" font-size="12.5" font-style="italic" fill="#0c5745">“a vida das populações — seus índices de</text>
  <text x="56" y="298" font-size="12.5" font-style="italic" fill="#0c5745">natalidade, morbidade e mortalidade —</text>
  <text x="56" y="314" font-size="12.5" font-style="italic" fill="#0c5745">tomada como superfície de intervenção”</text>

  <text x="56" y="346" font-size="10.5" letter-spacing="1.2" font-weight="700" fill="#0f6e56" font-family="Arial, Helvetica, sans-serif">DISTINTA DA DISCIPLINA</text>
  <text x="56" y="366" font-size="11.5" fill="#44443f">não incide sobre o corpo individual,</text>
  <text x="56" y="381" font-size="11.5" fill="#44443f">mas sobre a população como um todo.</text>

  <rect x="52" y="410" width="326" height="46" rx="8" fill="#e7f2ee"/>
  <text x="64" y="427" font-size="9.5" letter-spacing="1.2" font-weight="700" fill="#0f6e56" font-family="Arial, Helvetica, sans-serif">NA PrEP</text>
  <text x="64" y="444" font-size="11" fill="#0c4a3b">o adolescente como objeto de incidência</text>

  <!-- =============== COLUMN 2 · GOVERNAMENTALIDADE =============== -->
  <rect x="430" y="200" width="350" height="58" rx="10" fill="#3f5166"/>
  <text x="605" y="227" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">GOVERNAMENTALIDADE</text>
  <text x="605" y="245" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#c3ccd6" font-family="Arial, Helvetica, sans-serif">A FORMA · CONDUZIR CONDUTAS</text>
  <path d="M430,248 h350 v208 q0,10 -10,10 h-330 q-10,0 -10,-10 z" fill="#fbfaf8" stroke="#e4e1db"/>

  <text x="446" y="282" font-size="12.5" font-style="italic" fill="#2f3e4f">“a forma geral dessa racionalidade e as</text>
  <text x="446" y="298" font-size="12.5" font-style="italic" fill="#2f3e4f">tecnologias por que ela conduz condutas”</text>

  <text x="446" y="330" font-size="10.5" letter-spacing="1.2" font-weight="700" fill="#3f5166" font-family="Arial, Helvetica, sans-serif">SEGURANÇA · AULA DE 11/01/1978</text>
  <text x="446" y="350" font-size="11.5" fill="#44443f">atua sobre um meio de séries abertas de</text>
  <text x="446" y="365" font-size="11.5" fill="#44443f">acontecimentos, administradas</text>
  <text x="446" y="380" font-size="11.5" fill="#44443f">probabilisticamente, sem abolir o risco.</text>

  <rect x="442" y="410" width="326" height="46" rx="8" fill="#eef1f4"/>
  <text x="454" y="427" font-size="9.5" letter-spacing="1.2" font-weight="700" fill="#3f5166" font-family="Arial, Helvetica, sans-serif">NA PrEP</text>
  <text x="454" y="444" font-size="11" fill="#33424f">o PCDT como tecnologia de governo</text>

  <!-- footer: síntese -->
  <rect x="40" y="490" width="740" height="54" rx="10" fill="#1a1a1a"/>
  <text x="410" y="514" font-size="12.5" text-anchor="middle" fill="#f4f2ee">A biopolítica nomeia o objeto — a vida da população;</text>
  <text x="410" y="532" font-size="12.5" text-anchor="middle" fill="#9ec7b8">a governamentalidade, a forma — a racionalidade que conduz condutas.</text>
</svg>
